<!DOCTYPE html>
<html>

<head>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div class="controls-container">
        <i class="bi bi-play-circle-fill"></i>
        <!--TODO: need to add zoom buttons-->
    </div>


    <div class="panel">
        <div class="panel-nav">
            <div class="panel-nav-btn"><i class="bi bi-bounding-box-circles"></i></div>
            <div class="panel-nav-btn panel-nav-btn-selected"><i class="bi bi-graph-up"></i></div>
            <div class="panel-nav-btn"><i class="bi bi-table"></i></div>
            <div class="panel-nav-btn"><i class="bi bi-gear-fill"></i></div>
            <div class="panel-nav-btn"><i class="bi bi-download"></i></div>
        </div>
        <div class="panel-content">
            <h1>Selection</h1>
        </div>
        <div class="panel-content">
            <h1>Axes</h1>
            <!-- TODO: Custom radio button and checkbox -->
            <form id="axes">
                <h2>X-Axis</h2>  <!-- Make this smaller via css, not h3 -->
                <div><label><input type="radio" name="x-axis" value="time" checked>Time</label></div>
                <div><label><input type="radio" name="x-axis" value="displacement">Displacement</label></div>
                <h2>Y-Axis</h2>
                <div><label><input type="checkbox" name="y-axis" value="displacement">Displacement</label></div>
                <div><label><input type="checkbox" name="y-axis" value="velocity">Velocity</label></div>
                <div><label><input type="checkbox" name="y-axis" value="acceleration">Acceleration</label></div>
                <div><label><input type="checkbox" name="y-axis" value="force">Force</label></div>
                <div><label><input type="checkbox" name="y-axis" value="work">Work</label></div>
                <div><label><input type="checkbox" name="y-axis" value="momentum">Momentum</label></div>
            </form>
        </div>
        <div class="panel-content">
            <h1>Trials</h1>
            <form id="trials">
                <div>
                    <h3>Trial 1<span class="trial-btns"><input type="checkbox" name="trial" value=0 checked><i class="bi bi-x-lg"></i><i class="bi bi-pencil-square"></i></span></h3>
                    <label>Cart Mass: <input type="input" name="mass"> kg</label>
                </div>
                <div>
                    <h3>Trial 2<span class="trial-btns"><input type="checkbox" name="trial" value=1 checked><i class="bi bi-x-lg"></i><i class="bi bi-pencil-square"></i></span></h3>
                    <label>Cart Mass: <input type="input" name="mass"> kg</label>
                </div>
            </form>
        </div>
        <div class="panel-content">
            <h1>Lab Settings</h1>
        </div>
        <div class="panel-content panel-content-selected">
            <h1>Export</h1>
            <form>
                <select>
                    <option value="png">PNG</option>
                    <option value="jpg">JPEG</option>
                    <option value="csv">CSV</option>
                    <option value="json">JSON</option>
                </select>
                <input type="button" value="Export">
            </form>
        </div>
    </div>
    
</body>
<script src="script.js"></script>

</html>
