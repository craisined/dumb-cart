<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1" />
	<title>BLE Client Boilerplate</title>
	<style>
		:root {
			--bg: #f4f7fb;
			--surface: #ffffff;
			--text: #1e2832;
			--muted: #607080;
			--accent: #0b6efd;
			--accent-2: #0a58ca;
			--ok: #18794e;
			--err: #b42318;
			--border: #d8e0ea;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Source Sans 3", "Segoe UI", sans-serif;
			color: var(--text);
			background:
				radial-gradient(circle at top right, #e3f0ff 0%, transparent 45%),
				radial-gradient(circle at bottom left, #d8ffe8 0%, transparent 40%),
				var(--bg);
			min-height: 100vh;
			display: grid;
			place-items: center;
			padding: 1rem;
		}

		.card {
			width: min(860px, 100%);
			background: var(--surface);
			border: 1px solid var(--border);
			border-radius: 16px;
			padding: 1.25rem;
			box-shadow: 0 12px 30px rgba(22, 31, 40, 0.08);
		}

		h1 {
			margin: 0 0 0.5rem;
			font-size: 1.6rem;
		}

		p {
			margin: 0.2rem 0 1rem;
			color: var(--muted);
		}

		.grid {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			gap: 0.8rem;
			margin-bottom: 0.9rem;
		}

		.field {
			display: flex;
			flex-direction: column;
			gap: 0.3rem;
		}

		.field.wide {
			grid-column: 1 / -1;
		}

		label {
			font-size: 0.88rem;
			color: var(--muted);
		}

		input, textarea, button {
			font: inherit;
		}

		input, textarea {
			border: 1px solid var(--border);
			border-radius: 10px;
			padding: 0.55rem 0.65rem;
			color: var(--text);
			background: #fff;
		}

		textarea {
			min-height: 76px;
			resize: vertical;
		}

		.buttons {
			display: flex;
			flex-wrap: wrap;
			gap: 0.5rem;
			margin-bottom: 0.9rem;
		}

		button {
			border: 0;
			border-radius: 10px;
			padding: 0.56rem 0.8rem;
			cursor: pointer;
			background: #e8edf5;
			color: var(--text);
			transition: transform 120ms ease, background-color 120ms ease;
		}

		button:hover {
			transform: translateY(-1px);
			background: #dde6f2;
		}

		button.primary {
			background: var(--accent);
			color: #fff;
		}

		button.primary:hover {
			background: var(--accent-2);
		}

		.status {
			margin: 0 0 0.8rem;
			padding: 0.55rem 0.7rem;
			border-radius: 10px;
			background: #eef4ff;
			border: 1px solid #ccddff;
		}

		.status.ok {
			background: #ecfdf3;
			border-color: #bfe9cf;
			color: var(--ok);
		}

		.status.err {
			background: #fff2f2;
			border-color: #ffd0d0;
			color: var(--err);
		}

		.logs {
			background: #111827;
			color: #d1fae5;
			border-radius: 10px;
			border: 1px solid #1f2937;
			padding: 0.75rem;
			min-height: 180px;
			max-height: 320px;
			overflow: auto;
			white-space: pre-wrap;
			font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
			font-size: 0.84rem;
			line-height: 1.4;
		}

		@media (max-width: 680px) {
			.grid {
				grid-template-columns: 1fr;
			}
		}
	</style>
</head>
<body>
	<main class="card">
		<h1>Web Bluetooth Boilerplate</h1>
		<p>Communicate with your BLE peripheral from the browser using configurable UUIDs.</p>

		<section class="grid">
			<div class="field">
				<label for="serviceUuid">Service UUID</label>
				<input id="serviceUuid" value="12345678-1234-1234-1234-1234567890ab" />
			</div>
			<div class="field">
				<label for="characteristicUuid">Characteristic UUID</label>
				<input id="characteristicUuid" value="12345678-1234-1234-1234-1234567890ac" />
			</div>
			<div class="field">
				<label for="deviceName">Optional device name filter</label>
				<input id="deviceName" placeholder="MyPeripheral" />
			</div>
			<div class="field">
				<label for="namePrefix">Optional name prefix filter</label>
				<input id="namePrefix" placeholder="My" />
			</div>
			<div class="field wide">
				<label for="writeText">Write payload (UTF-8 text)</label>
				<textarea id="writeText" placeholder="hello BLE"></textarea>
			</div>
		</section>

		<section class="buttons">
			<button id="connectBtn" class="primary">Connect</button>
			<button id="disconnectBtn">Disconnect</button>
			<button id="readBtn">Read</button>
			<button id="writeBtn">Write</button>
			<button id="notifyBtn">Start Notify</button>
			<button id="stopNotifyBtn">Stop Notify</button>
			<button id="clearLogBtn">Clear Log</button>
		</section>

		<div id="status" class="status">Status: idle</div>
		<pre id="logs" class="logs" aria-live="polite"></pre>
	</main>

	<script src="script.js"></script>
</body>
</html>
