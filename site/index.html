<!DOCTYPE html>
<html>

<head>
    <title>𝐃𝐮𝐦𝐛𝐜𝐚𝐫𝐭</title>
    <meta charset="utf-8">
    <link rel="icon" type="image/svg+xml" href='data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="%23f1e9eb" class="bi bi-minecart" viewBox="0 0 16 16"><path d="M4 15a1 1 0 1 1 0-2 1 1 0 0 1 0 2m0 1a2 2 0 1 0 0-4 2 2 0 0 0 0 4m8-1a1 1 0 1 1 0-2 1 1 0 0 1 0 2m0 1a2 2 0 1 0 0-4 2 2 0 0 0 0 4M.115 3.18A.5.5 0 0 1 .5 3h15a.5.5 0 0 1 .491.592l-1.5 8A.5.5 0 0 1 14 12H2a.5.5 0 0 1-.491-.408l-1.5-8a.5.5 0 0 1 .106-.411zm.987.82 1.313 7h11.17l1.313-7z"/></svg>'>
    <link href="style.css" rel="stylesheet">
</head>

<body>
    <div class="chart-container">
        <canvas id="chart"></canvas>
    </div>

    <div class="controls-container">
        <!-- Optional TODO: add functionality where the zoom-spacer is -->
        <div class="zoom-spacer"></div>
        <i class="bi bi-play-circle-fill" id="start-trial-btn"></i>
        <div class="zoom-controls-container">
            <i class="bi bi-zoom-in" id="zoom-in"></i>
            <i class="bi bi-zoom-out" id="zoom-out"></i>
            <i class="bi bi-house-door" id="zoom-reset"></i>
        </div>
    </div>


    <div class="panel">
        <div class="panel-nav">
            <div class="panel-nav-btn" data-tab-target="#selection-panel"><i class="bi bi-bounding-box-circles"></i></div>
            <div class="panel-nav-btn panel-nav-btn-selected" data-tab-target="#axes-panel"><i class="bi bi-graph-up"></i></div>
            <div class="panel-nav-btn" data-tab-target="#trials-panel"><i class="bi bi-table"></i></div>
            <div class="panel-nav-btn" data-tab-target="#settings-panel"><i class="bi bi-gear-fill"></i></div>
            <div class="panel-nav-btn" data-tab-target="#export-panel"><i class="bi bi-download"></i></div>
        </div>
        <div id="selection-panel" class="panel-content" data-tab-content>
            <h1>Selection</h1>
            //Didn't find good icons for these, so just using text for now
            <button id="selection">Selection</button>
            <button id="pan">Pan</button>
        </div>
        <div id="axes-panel" class="panel-content panel-content-selected" data-tab-content>
            <h1>Axes</h1>
            <!-- TODO: Custom radio button and checkbox -->
            <h2>X-Axis</h2>
            <div><label><input type="radio" name="x-axis" value="time" checked>Time</label></div>
            <!-- <div><label><input type="radio" name="x-axis" value="displacement">Displacement</label></div> -->
            <h2>Y-Axis</h2>
            <!-- TODO: Implement these
            <div><label><input type="checkbox" name="y-axis" value="displacement">Displacement</label></div>
            <div><label><input type="checkbox" name="y-axis" value="velocity">Velocity</label></div>
            <div><label><input type="checkbox" name="y-axis" value="acceleration">Acceleration</label></div>
            <div><label><input type="checkbox" name="y-axis" value="force">Force</label></div>
            <div><label><input type="checkbox" name="y-axis" value="work">Work</label></div>
            <div><label><input type="checkbox" name="y-axis" value="momentum">Momentum</label></div>
            -->
            <div><label><input type="checkbox" name="y-axis" value="acceleration">Acceleration</label></div>
            <div><label><input type="checkbox" name="y-axis" value="force">Force</label></div>
            <div><label><input type="checkbox" name="y-axis" value="encoder">Encoder</label></div>
        </div>
        <div id="trials-panel" class="panel-content" data-tab-content>
            <h1>Trials</h1>
        </div>
        <div id="settings-panel" class="panel-content" data-tab-content>
            <h1>Lab Settings</h1>
            <h2>Carts</h2>
            <button type="button" id="connect-btn">Connect <i class="bi bi-bluetooth"></i></button>
            <button type="button" id="disconnect-btn">Disconnect <i class="bi bi-x-lg"></i></button>
        </div>

        
        <div id="export-panel" class="panel-content" data-tab-content>
            <h1>Export</h1>
            <select id="export-format">
                <option value="png">PNG</option>
                <option value="jpeg">JPEG</option>
                <option value="csv">CSV</option>
                <option value="json">JSON</option>
            </select>
            <button type="button" id="export-trigger">Export</button>
        </div>
    </div>
    

</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.2.0/dist/chartjs-plugin-zoom.min.js"></script>

<script src="script.js"></script>

</html>
